<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mattevy's Mailbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/base.css">
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────────── -->
  <header id="app-header">
    <svg class="postmark-decoration" width="160" height="160" viewBox="0 0 160 160"
         aria-hidden="true" focusable="false">
      <circle cx="80" cy="80" r="72" fill="none" stroke="#E0C9A6" stroke-width="2"
              stroke-dasharray="6 4"/>
      <circle cx="80" cy="80" r="58" fill="none" stroke="#E0C9A6" stroke-width="1"
              stroke-dasharray="4 5"/>
      <line x1="16" y1="72" x2="144" y2="72" stroke="#E0C9A6" stroke-width="1.5"/>
      <line x1="16" y1="80" x2="144" y2="80" stroke="#E0C9A6" stroke-width="1.5"/>
      <line x1="16" y1="88" x2="144" y2="88" stroke="#E0C9A6" stroke-width="1.5"/>
    </svg>
    <div class="header-content">
      <h1 class="app-title"><span class="icon-inline" id="header-icon"></span> Mattevy's Mailbox</h1>
      <p class="app-tagline">"Drop your ideas. We'll make memories."</p>
      <p class="app-names">Matt &nbsp;·&nbsp; Evy</p>
    </div>
    <p class="header-divider">· · ·</p>
  </header>

  <!-- ── MAIN (Tab Panes) ──────────────────────────────────────── -->
  <main id="app-main">

    <!-- ── TAB: WRITE ──────────────────────────────────────────── -->
    <div class="tab-pane active" id="tab-write" data-tab="write">
      <section id="submission-section">
        <p class="section-label"><span class="icon-inline" id="section-write-icon"></span> New Idea</p>

        <!-- Wizard progress bar -->
        <div class="wizard-progress" id="wizard-progress">
          <div class="wizard-track">
            <div class="wizard-fill" id="wizard-fill"></div>
          </div>
          <div class="wizard-steps">
            <span class="wizard-dot active" data-step="0"></span>
            <span class="wizard-dot" data-step="1"></span>
            <span class="wizard-dot" data-step="2"></span>
          </div>
        </div>

        <div id="submission-card" class="postcard submission-card" style="transform-style: preserve-3d;">
          <span class="card-watermark" id="form-watermark" aria-hidden="true">write your idea…</span>
          <span class="stamp-decoration" id="stamp-icon" aria-hidden="true"></span>

          <!-- Wizard container -->
          <div class="wizard-viewport" id="wizard-viewport">
            <div class="wizard-slider" id="wizard-slider">

              <!-- Step 1: Title + Description -->
              <div class="wizard-step" data-step="0">
                <label class="sr-only" for="field-title">Idea title</label>
                <input id="field-title" class="field-title" type="text"
                       placeholder="What's the idea?" autocomplete="off"
                       aria-label="Idea title" maxlength="120"/>

                <label class="sr-only" for="field-description">Description</label>
                <input id="field-description" class="field-description" type="text"
                       placeholder="Describe it in one line…" autocomplete="off"
                       aria-label="Description" maxlength="240"/>
              </div>

              <!-- Step 2: Category + Cost -->
              <div class="wizard-step" data-step="1">
                <p class="wizard-step-label">Pick a vibe</p>
                <div class="field-row" role="group" aria-label="Cost">
                  <div class="chip-group" id="cost-chips" role="radiogroup" aria-label="Cost level">
                    <button class="chip" data-value="$"   role="radio" aria-checked="false" aria-label="Budget: $">$</button>
                    <button class="chip" data-value="$$"  role="radio" aria-checked="false" aria-label="Budget: $$">$$</button>
                    <button class="chip" data-value="$$$" role="radio" aria-checked="false" aria-label="Budget: $$$">$$$</button>
                  </div>
                </div>
                <div class="field-row" role="group" aria-label="Category">
                  <div class="chip-group" id="category-chips" role="radiogroup" aria-label="Category">
                    <button class="chip" data-value="Food"      role="radio" aria-checked="false">Food</button>
                    <button class="chip" data-value="Outdoors"  role="radio" aria-checked="false">Outdoors</button>
                    <button class="chip" data-value="Cozy"      role="radio" aria-checked="false">Cozy</button>
                    <button class="chip" data-value="Adventure" role="radio" aria-checked="false">Adventure</button>
                    <button class="chip" data-value="Culture"   role="radio" aria-checked="false">Culture</button>
                  </div>
                </div>
              </div>

              <!-- Step 3: Location + Signature -->
              <div class="wizard-step" data-step="2">
                <p class="wizard-step-label">Almost done!</p>
                <div class="field-row">
                  <span class="field-icon" id="location-icon" aria-hidden="true"></span>
                  <label class="sr-only" for="field-location">Location</label>
                  <input id="field-location" class="field-location" type="text"
                         placeholder="Where? (optional)" autocomplete="off"
                         aria-label="Location" maxlength="100"/>
                </div>
                <div class="card-footer">
                  <span class="signature-label">Signed:</span>
                  <label class="sr-only" for="field-added-by">Your name</label>
                  <input id="field-added-by" class="signature-input" type="text"
                         placeholder="Your name" autocomplete="off"
                         aria-label="Your name" maxlength="40"/>
                  <span class="signature-icon" id="signature-icon" aria-hidden="true"></span>
                </div>
              </div>

            </div>
          </div>

          <!-- Wizard navigation -->
          <div class="wizard-nav" id="wizard-nav">
            <button class="wizard-btn wizard-prev" id="wizard-prev" style="visibility:hidden">← Back</button>
            <button class="wizard-btn wizard-next" id="wizard-next">Next →</button>
            <button class="wizard-btn wizard-send" id="submit-btn" style="display:none" disabled aria-label="Send idea">Send it</button>
          </div>
          <p id="submit-error" class="submit-error" style="display:none" role="alert"></p>
        </div>
      </section>
    </div>

    <!-- ── TAB: THE BOX ────────────────────────────────────────── -->
    <div class="tab-pane" id="tab-box" data-tab="box">

      <!-- Filter pills -->
      <div class="filter-pills-bar" id="filter-pills-bar">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="Food"><span class="icon-inline" id="filter-food-icon"></span> Food</button>
        <button class="filter-pill" data-filter="Outdoors"><span class="icon-inline" id="filter-outdoors-icon"></span> Outdoors</button>
        <button class="filter-pill" data-filter="Cozy"><span class="icon-inline" id="filter-cozy-icon"></span> Cozy</button>
        <button class="filter-pill" data-filter="Adventure"><span class="icon-inline" id="filter-adventure-icon"></span> Adventure</button>
        <button class="filter-pill" data-filter="Culture"><span class="icon-inline" id="filter-culture-icon"></span> Culture</button>
        <button class="filter-pill" data-filter="$">$</button>
        <button class="filter-pill" data-filter="$$">$$</button>
        <button class="filter-pill" data-filter="$$$">$$$</button>
      </div>

      <!-- Skeleton loading cards -->
      <div id="skeleton-cards" class="skeleton-cards" style="display:none">
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-line skeleton-title"></div><div class="skeleton-circle"></div></div><div class="skeleton-line skeleton-desc"></div><div class="skeleton-line skeleton-meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-line skeleton-title"></div><div class="skeleton-circle"></div></div><div class="skeleton-line skeleton-desc"></div><div class="skeleton-line skeleton-meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-line skeleton-title"></div><div class="skeleton-circle"></div></div><div class="skeleton-line skeleton-desc"></div><div class="skeleton-line skeleton-meta"></div></div>
      </div>

      <!-- Top Picks -->
      <section id="top-picks-section">
        <h2 class="section-header"><span class="icon-inline" id="section-heart-icon"></span> Top Picks</h2>
        <div id="top-picks-list" class="card-list"></div>
        <p id="top-picks-empty" class="empty-state" style="display:none">
          Heart an idea to pin it here
        </p>
      </section>

      <!-- The Box -->
      <section id="the-box-section">
        <h2 class="section-header"><span class="icon-inline" id="section-box-icon"></span> The Box</h2>
        <div id="the-box-list" class="card-list"></div>
        <p id="the-box-empty" class="empty-state" style="display:none">
          The box is empty — drop an idea above!
        </p>
      </section>

      <!-- Surprise Me FAB -->
      <button class="surprise-fab" id="surprise-fab" aria-label="Surprise me — pick a random idea">
        <span id="surprise-fab-icon"></span>
      </button>
    </div>

    <!-- ── TAB: ARCHIVE ────────────────────────────────────────── -->
    <div class="tab-pane" id="tab-archive" data-tab="archive">
      <section id="archive-section">
        <h2 class="section-header">
          <span class="icon-inline" id="section-archive-icon"></span> Archive <span id="archive-count"></span>
        </h2>
        <div id="archive-list" class="card-list"></div>
        <p id="archive-empty" class="empty-state" style="display:none">
          Nothing archived yet — you've got dates to go on!
        </p>
      </section>
    </div>

    <!-- ── ANIMATION OVERLAY ───────────────────────────────────── -->
    <div id="animation-overlay" class="anim-overlay" role="status" aria-live="polite"
         aria-label="Sending your idea" style="display:none;">
      <div id="anim-envelope" class="anim-envelope" aria-hidden="true">
        <svg width="80" height="56" viewBox="0 0 80 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="78" height="54" rx="5" fill="#E8D5B7" stroke="#3D2B1F" stroke-width="1.5"/>
          <line x1="1" y1="1" x2="40" y2="30" stroke="#3D2B1F" stroke-width="1.5"/>
          <line x1="79" y1="1" x2="40" y2="30" stroke="#3D2B1F" stroke-width="1.5"/>
          <line x1="1"  y1="55" x2="36" y2="33" stroke="#3D2B1F" stroke-width="1.5"/>
          <line x1="79" y1="55" x2="44" y2="33" stroke="#3D2B1F" stroke-width="1.5"/>
          <path d="M35 18 38 22 46 14" stroke="#C0392B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div id="anim-box" class="anim-ballot-box" aria-hidden="true">
        <svg width="100" height="120" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="20" width="90" height="95" rx="6" fill="#FDF6EC" stroke="#3D2B1F" stroke-width="2"/>
          <rect x="30" y="20" width="40" height="8" rx="2" fill="#3D2B1F"/>
          <rect x="32" y="22" width="36" height="4" rx="1" fill="#5a3e30" opacity="0.5"/>
          <rect x="5" y="20" width="90" height="22" rx="6" fill="#E8D5B7" stroke="#3D2B1F" stroke-width="2"/>
          <rect x="30" y="24" width="40" height="8" rx="2" fill="#3D2B1F"/>
          <path d="M22 82 c0-4 4-7 8-7s8 3 8 7-4 7-8 7-8-3-8-7z" fill="none" stroke="#F2C4CE" stroke-width="1.5"/>
          <path d="M62 82 c0-4 4-7 8-7s8 3 8 7-4 7-8 7-8-3-8-7z" fill="none" stroke="#F2C4CE" stroke-width="1.5"/>
          <rect x="42" y="78" width="16" height="12" rx="2" fill="none" stroke="#E8D5B7" stroke-width="1.5"/>
          <path d="M42 78 50 84 58 78" stroke="#E8D5B7" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div id="anim-hearts" class="anim-hearts" aria-hidden="true"></div>
    </div>

    <!-- ── SURPRISE ME MODAL ───────────────────────────────────── -->
    <div class="surprise-modal-overlay" id="surprise-modal" style="display:none">
      <div class="surprise-modal" id="surprise-modal-content">
        <button class="surprise-close" id="surprise-close" aria-label="Close"><span id="surprise-close-icon"></span></button>
        <div class="surprise-emoji" id="surprise-emoji"></div>
        <h2 class="surprise-title" id="surprise-title"></h2>
        <p class="surprise-desc" id="surprise-desc"></p>
        <div class="surprise-meta" id="surprise-meta"></div>
        <button class="surprise-cta" id="surprise-cta">Let's do this tonight <span id="surprise-cta-sparkle"></span></button>
      </div>
    </div>

    <!-- ── CONFETTI / STAMP OVERLAY ────────────────────────────── -->
    <div class="stamp-overlay" id="stamp-overlay" style="display:none">
      <div class="stamp-seal" id="stamp-seal">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="55" fill="#C0392B" opacity="0.9"/>
          <circle cx="60" cy="60" r="48" fill="none" stroke="#FDF6EC" stroke-width="2" stroke-dasharray="4 3"/>
          <text x="60" y="52" text-anchor="middle" fill="#FDF6EC" font-family="Caveat, cursive" font-size="22" font-weight="700">DONE</text>
          <path d="M50 68 56 74 70 60" stroke="#FDF6EC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="confetti-container" id="confetti-container"></div>
    </div>

  </main>

  <!-- ── BOTTOM TAB BAR ────────────────────────────────────────── -->
  <nav class="tab-bar" id="tab-bar" aria-label="Main navigation">
    <button class="tab-bar-btn active" data-tab="write" aria-label="Write a new idea" aria-current="page">
      <span class="tab-bar-icon" id="tab-icon-write"></span>
      <span class="tab-bar-label">Write</span>
    </button>
    <button class="tab-bar-btn" data-tab="box" aria-label="The Box — browse ideas">
      <span class="tab-bar-icon" id="tab-icon-box"></span>
      <span class="tab-bar-label">The Box</span>
    </button>
    <button class="tab-bar-btn" data-tab="archive" aria-label="Archive — completed dates">
      <span class="tab-bar-icon" id="tab-icon-archive"></span>
      <span class="tab-bar-label">Archive</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
